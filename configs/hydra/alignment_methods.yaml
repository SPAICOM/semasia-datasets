repo_id: "spaicom-lab"
prefix: "semasia-"

datasets:
  - cifar10
  - mnist
  - fashion_mnist

train_split: train
test_split: test

model_b: vit_large_patch16_224.augreg_in21k  

models_a:
  - vit_base_patch16_224.augreg_in21k
  - vit_large_patch16_384.augreg_in21k_ft_in1k
  - vit_small_patch16_224.augreg_in1k
  - aimv2_1b_patch14_224.apple_pt

seed: 42

# k is used as n_prototypes for proto and n_components for CCA
k_values:
  - 2
  - 4
  - 8
  - 16
  - 32
  - 64
  - 128

# Methods to run (proto | cca | linear)
methods:
  - proto
  - cca
  - linear

# Toggle metrics on/off
metrics:
  accuracy: true
  mse: true

save_results: true
