defaults:
  - _self_
  - clustering: kmeans

repo_id: "spaicom-lab"
prefix: "semantic-"
dataset: cifar10
split: train
model: null

seed: 42

n_prototypes: 20
n_samples: null

limit_models: null
n_jobs: 1

download_only: false
force_recompute: false

compute_stat: true
compute_tda: false

tda:
  max_points: 1000
  dim_reduction: pca
  dim_reduction_components: 20
  normalize: standard
  max_dim: 2
  simplicial_filter: VietorisRips
  n_bins: 100
  sigma: 0.1
  metric: euclidean

metrics:
  - total_spread
  - mean_distance_to_centroid
  - std_distance_to_centroid
  - participation_ratio_fast
  - isotropy
  - anisotropy_ratio
  - density
  - n_components_90pct
  - explained_var_ratio_top1
  - explained_var_ratio_top3
  - top_eigenvalue_ratio
  - spectral_entropy
  - effective_rank
  - participation_ratio

save_results: true
