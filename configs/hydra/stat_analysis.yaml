repo_id: "spaicom-lab"
prefix: "semantic-"
datasets:
  - cifar10
  - mnist
  - oxford-flowers
  - fashion_mnist
split: train

compute_probing: true

stat_cases:
  - raw

probing_outcomes:
  - probing_accuracy
  - probing_recall
  - probing_precision
  - probing_f1

metrics:
  - total_spread
  - mean_distance_to_centroid
  - std_distance_to_centroid
  # - participation_ratio_fast
  - isotropy
  - density
  - n_components_90pct
  - explained_var_ratio_top1
  - explained_var_ratio_top3
  # - top_eigenvalue_ratio
  - spectral_entropy
  - effective_rank
  # - participation_ratio

regression_types:
  - pooled
  - within
  - interaction

save_results: true
