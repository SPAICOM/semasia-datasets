defaults:
  - _self_
  - clustering: kmeans

repo_id: "spaicom-lab"
prefix: "semantic-"
dataset: cifar10
split: train

seed: 42

n_prototypes: 64
n_samples: 10

download_only: false
regression_only: false
use_prototypes: false

metrics:
  - total_spread
  - mean_distance_to_centroid
  - std_distance_to_centroid
  - participation_ratio_fast
  - isotropy
  - anisotropy_ratio
  - density
  - n_components_90pct
  - explained_var_ratio_top1
  - explained_var_ratio_top3
  - top_eigenvalue_ratio
  - spectral_entropy
  - effective_rank
  - participation_ratio

save_heatmaps: true
save_results: true
